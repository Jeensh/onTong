version: '3.8'

services:
  # ==============================
  # Nginx Reverse Proxy / Load Balancer
  # ==============================

  nginx:
    image: nginx:alpine
    container_name: ontong-nginx
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 256M
    restart: unless-stopped

  # ==============================
  # Core Application Services
  # ==============================

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    env_file: .env
    environment:
      - CHROMADB_HOST=chroma
      - CHROMADB_PORT=8000
      - LANGFUSE_HOST=http://langfuse:3000
      - FRONTEND_URL=http://frontend:3000
      - WIKI_DIR=/app/wiki
      - REDIS_URL=redis://redis:6379/0
      - OLLAMA_NUM_PARALLEL=4
    volumes:
      - wiki_data:/app/wiki
      - backend_logs:/app/.logs
    ports:
      - "8001:8001"
    depends_on:
      chroma:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 4G
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      - BACKEND_URL=http://backend:8001
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
    restart: unless-stopped

  # ==============================
  # Infrastructure Services
  # ==============================

  # Redis - Shared state (locks, cache)
  redis:
    image: redis:7-alpine
    container_name: ontong-redis
    command: ["redis-server", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
    restart: unless-stopped

  # ChromaDB - Vector Database for RAG
  chroma:
    image: chromadb/chroma:latest
    container_name: ontong-chroma
    environment:
      IS_PERSISTENT: "true"
      PERSIST_DIRECTORY: "/chroma/data"
    volumes:
      - chroma_data:/chroma/data
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/heartbeat"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
    restart: unless-stopped

  # PostgreSQL for Langfuse (optional — monitoring)
  postgres:
    image: postgres:16-alpine
    container_name: ontong-postgres
    environment:
      POSTGRES_USER: langfuse
      POSTGRES_PASSWORD: langfuse_dev
      POSTGRES_DB: langfuse
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U langfuse"]
      interval: 10s
      timeout: 5s
      retries: 5
    profiles:
      - monitoring

  # Langfuse - LLM Monitoring & Observability (optional)
  langfuse:
    image: langfuse/langfuse:latest
    container_name: ontong-langfuse
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgresql://langfuse:langfuse_dev@postgres:5432/langfuse"
      NEXTAUTH_SECRET: "your-secret-change-in-production"
      NEXTAUTH_URL: "http://localhost:3001"
      SALT: "your-salt-change-in-production"
    ports:
      - "3001:3000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    profiles:
      - monitoring

volumes:
  wiki_data:
  chroma_data:
  redis_data:
  postgres_data:
  backend_logs:

networks:
  default:
    name: ontong-network
